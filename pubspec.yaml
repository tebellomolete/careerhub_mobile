name: careerhub_mobile
description: "CareerHub — Week 2 Assignment 2.2: Immutable Models, Dart 3 & Freezed."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.0
  go_router: ^17.3.0
  # Assignment 2.1 — runtime HTTP client. Dio (not http) because we want
  # interceptors (LogInterceptor for the terminal-visible request log the
  # brief asks for), typed timeouts, and a BaseOptions we can hydrate from
  # a compile-time env var. See README, Q2.
  dio: ^5.7.0
  # Assignment 2.1 — the tiny runtime annotation package the code
  # generator reads to know which functions/classes to generate providers
  # for. This is a plain runtime dep because the generated .g.dart files
  # import it at runtime — the compile-time GENERATOR (riverpod_generator)
  # is a dev_dependency below. See README, Q3.
  riverpod_annotation: ^3.0.0
  # Assignment 2.2 — the two RUNTIME annotation packages. `freezed_annotation`
  # supplies the `@freezed`, `@Default`, `@JsonKey`-adjacent metadata that
  # the generated `*.freezed.dart` file imports at runtime. `json_annotation`
  # supplies the `@JsonKey`, `@JsonSerializable`, and helpers that the
  # generated `*.g.dart` file imports at runtime. Both must live in the
  # runtime `dependencies:` section because the generated files that ship
  # with the app import them; the GENERATORS themselves (freezed,
  # json_serializable) are dev-only. See README 2.2, Q2.
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  # W2D3 in-class challenge — persistence + connectivity stack for the
  # Applications feature. `isar_community` is the actively-maintained fork
  # of Isar (the original `isar` package hasn't been updated for
  # analyzer 8, which our `custom_lint` from Assignment 2.1 requires);
  # `isar_flutter_libs_community` ships the platform binaries (MUST be
  # in dependencies, NOT dev_dependencies — the compiled app links
  # against them). `shared_preferences` holds the persisted filter
  # selection + last-synced timestamp. `connectivity_plus` drives the
  # offline banner via a StreamProvider.
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.1.0
  # `path_provider` gives us the app-documents directory that Isar
  # writes its `.isar` file into. Pulled in explicitly because
  # `isar_community` doesn't re-export it, and calling `Isar.open`
  # without a directory would default to a location we don't want to
  # rely on across platforms.
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Assignment 2.1 — dev-only tools. These run under `dart run
  # build_runner build` and produce lib/**/*.g.dart; they are NEVER part
  # of the compiled app. That's why they live under dev_dependencies:
  # ship the output, not the toolchain.
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0
  # Riverpod 3's lint rules — surfaces `avoid_manual_providers_as_generated_provider_dependency`
  # and friends. Runs under the same custom_lint host.
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.0
  # Assignment 2.2 — dev-only code generators. `freezed` emits the
  # `*.freezed.dart` mixin (with ==, hashCode, copyWith, toString);
  # `json_serializable` emits the `*.g.dart` file with the
  # `_$JobDtoFromJson` / `_$JobDtoToJson` functions. Neither ships in the
  # compiled app — only the generated Dart source they produce does.
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  # W2D3 in-class challenge — Isar's schema code generator (community
  # fork). Emits the `*.g.dart` collection schemas next to each
  # `@Collection()`-annotated class. Runs under the same build_runner
  # host as freezed and json_serializable — one
  # `dart run build_runner build` regenerates all three.
  isar_community_generator: ^3.3.2

flutter:
  uses-material-design: true
